# Simplified docker-compose for faster development
version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: stabix
      POSTGRES_USER: stabix
      POSTGRES_PASSWORD: stabix
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_postgis.sql:/docker-entrypoint-initdb.d/init_postgis.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stabix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: docker/api.Dockerfile
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 stabix_backend.asgi:application
      "
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgis://stabix:stabix@postgres:5432/stabix
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=stabix_backend.settings.local
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: docker/celery.Dockerfile
    command: celery -A stabix_backend worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgis://stabix:stabix@postgres:5432/stabix
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=stabix_backend.settings.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN:-}
      - NEXT_PUBLIC_APP_NAME=Stabix
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
