version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stabix}
      POSTGRES_USER: ${POSTGRES_USER:-stabix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stabix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_postgis.sql:/docker-entrypoint-initdb.d/init_postgis.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stabix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stabix-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stabix-network

  api:
    build:
      context: ./backend
      dockerfile: docker/api.Dockerfile
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 stabix_backend.asgi:application
      "
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgis://stabix:stabix@postgres:5432/stabix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=stabix_backend.settings.local
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000,http://frontend:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stabix-network

  celery:
    build:
      context: ./backend
      dockerfile: docker/celery.Dockerfile
    command: celery -A stabix_backend worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgis://stabix:stabix@postgres:5432/stabix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=stabix_backend.settings.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stabix-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: docker/celery.Dockerfile
    command: celery -A stabix_backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgis://stabix:stabix@postgres:5432/stabix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=stabix_backend.settings.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stabix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN:-}
      - NEXT_PUBLIC_APP_NAME=Stabix
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - stabix-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend
    networks:
      - stabix-network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  stabix-network:
    driver: bridge
